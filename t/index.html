<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tabs project</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="tabs">
      <button class="tab active" data-tab="1">First Tab</button>
      <button class="tab" data-tab="2">Second Tab</button>
      <button class="tab" data-tab="3">Third Tab</button>
    </div>
    <div class="content active" id="tab-1">First Content</div>
    <div class="content" id="tab-2">Second Content</div>
    <div class="content" id="tab-3">Third Content</div>

    <script src="script.js"></script>
  </body>
</html>
